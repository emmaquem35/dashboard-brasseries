<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brasseries à la Mode — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Jost:wght@300;400;500;600&display=swap');
:root{
  /* Palette crème rosée — inspirée du site BALM */
  --bg:#F7F0EE;
  --surface:#FFFCFB;
  --surface2:#F2EAE8;
  --surface3:#E8DCDA;
  --border:rgba(160,100,90,0.1);
  --border2:rgba(160,100,90,0.18);
  --text:#2A1A18;
  --text2:#7A5A55;
  --text3:#B09590;
  --green:#2E7D52;--green-bg:#E8F5EE;--green-t:#1C5235;
  --red:#B83030;--red-bg:#FAEBEB;--red-t:#7A1E1E;
  --blue:#3060A8;--blue-bg:#EAF0FB;--blue-t:#1C3E75;
  --amber:#9A6A10;--amber-bg:#FBF2DC;--amber-t:#6A480A;
  /* Couleurs signature */
  --topbar:#2A1A18;        /* brun très foncé topbar */
  --accent:#C4956A;        /* or rosé / caramel */
  --accent2:#E8C4B8;       /* rose poudré */
  --warm:#6B3A30;          /* brun chaud boutons actifs */
  --r:8px;--r-sm:5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Jost',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh;}

/* ── TOPBAR ── */
.topbar{
  background:var(--topbar);
  border-bottom:1px solid rgba(196,149,106,0.2);
  padding:0 1.8rem;
  display:flex;align-items:center;gap:0;
  height:56px;position:sticky;top:0;z-index:100;
}
/* Logo zone */
.logo-zone{display:flex;align-items:center;gap:14px;padding-right:20px;border-right:1px solid rgba(196,149,106,0.2);}
.logo-img{display:flex;align-items:center;}
.logo-text{display:flex;flex-direction:column;gap:1px;}
.logo-main{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:0.01em;line-height:1.2;}
.logo-sub{font-size:9px;color:var(--accent);letter-spacing:0.16em;text-transform:uppercase;font-weight:400;}
/* Nav */
.nav-tabs{display:flex;gap:1px;margin-left:20px;}
.nav-tab{
  padding:6px 18px;border-radius:4px;border:none;
  background:transparent;font-size:13px;
  color:rgba(255,255,255,0.5);cursor:pointer;
  font-weight:500;transition:all .15s;
  font-family:'Jost',sans-serif;letter-spacing:0.01em;
}
.nav-tab:hover{color:rgba(255,255,255,0.85);background:rgba(255,255,255,0.06);}
.nav-tab.active{
  color:#fff;background:rgba(196,149,106,0.2);
  border-bottom:2px solid var(--accent);
}
.topbar-deco{
  margin-left:auto;
  font-family:'Playfair Display',serif;font-style:italic;
  font-size:12px;color:rgba(196,149,106,0.45);
}

/* ── UPLOAD BAR ── */
.upload-bar{
  background:var(--surface);
  border-bottom:1px solid var(--border2);
  padding:7px 1.8rem;
  display:flex;align-items:center;gap:7px;
  position:sticky;top:56px;z-index:99;
}
.upload-bar-label{font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.1em;margin-right:3px;}
.ubtn{
  padding:4px 12px;border-radius:var(--r-sm);
  border:1px solid var(--border2);background:var(--surface);
  font-size:11px;color:var(--text2);cursor:pointer;
  white-space:nowrap;transition:all .12s;font-weight:500;
  font-family:'Jost',sans-serif;
}
.ubtn:hover{background:var(--surface2);border-color:var(--accent);}
.ubtn.loaded{border-color:var(--green);color:var(--green-t);background:var(--green-bg);}
.ubtn-reset{color:var(--red-t);border-color:rgba(184,48,48,0.2);}
.ubtn-reset:hover{background:var(--red-bg);}
.ustatus{font-size:11px;color:var(--text3);margin-left:6px;}

/* ── LAYOUT ── */
.page{display:none;padding:1.5rem 1.8rem;max-width:1400px;margin:0 auto;}
.page.active{display:block;}

/* ── TOOLBAR ── */
.toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1.2rem;flex-wrap:wrap;}
.rtab{padding:6px 16px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);font-size:13px;color:var(--text2);cursor:pointer;font-weight:500;transition:all .12s;font-family:'Jost',sans-serif;}
.rtab:hover{border-color:var(--warm);color:var(--text);}
.rtab.active{background:var(--warm);color:#fff;border-color:var(--warm);}
.vtab{padding:5px 14px;border-radius:var(--r-sm);border:1px solid var(--border2);background:var(--surface);font-size:12px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;}
.vtab.active{background:var(--blue-bg);color:var(--blue-t);border-color:var(--blue);}
.sep{flex:1;}

/* ── CARD ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:14px;}
.card-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:14px;}
.row{display:grid;gap:12px;margin-bottom:12px;}
.col2{grid-template-columns:1fr 1fr;}
.col3{grid-template-columns:1fr 1fr 1fr;}
.col4{grid-template-columns:repeat(4,minmax(0,1fr));}
.col5{grid-template-columns:repeat(5,minmax(0,1fr));}

/* ── KPI ── */
.kpi{background:var(--surface2);border-radius:var(--r-sm);padding:16px;border:1px solid var(--border);}
.kpi-lbl{font-size:10px;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;font-weight:600;}
.kpi-val{font-size:28px;font-weight:700;color:var(--text);line-height:1.1;letter-spacing:-0.02em;}
.kpi-sub{font-size:12px;color:var(--text3);margin-top:5px;line-height:1.5;}
.kpi-sub .up{color:var(--green);font-weight:600;}
.kpi-sub .dn{color:var(--red);font-weight:600;}

/* ── BANNER ── */
.banner{display:flex;align-items:center;gap:10px;border-radius:var(--r-sm);padding:11px 16px;margin-bottom:1rem;font-size:13px;line-height:1.5;}
.banner.section{background:var(--warm);color:#fff;font-weight:600;border-left:3px solid var(--accent);}
.banner.ok{background:var(--green-bg);border:1px solid rgba(46,125,82,0.2);color:var(--green-t);}
.banner.warn{background:var(--red-bg);border:1px solid rgba(184,48,48,0.2);color:var(--red-t);}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{font-size:10px;color:var(--text3);font-weight:600;text-align:left;padding:8px 10px;border-bottom:2px solid var(--border2);white-space:nowrap;text-transform:uppercase;letter-spacing:.06em;}
.tbl th.r{text-align:right;}
.tbl td{padding:9px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl td.r{text-align:right;}
.tbl tbody tr:hover td{background:var(--surface2);}
.avg-row td{font-size:12px;color:var(--text3);font-style:italic;border-top:2px solid var(--border2);background:var(--surface2);}

/* ── RANK ── */
.rank{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:700;margin-right:4px;}
.r1{background:var(--accent);color:#fff;}
.r2{background:var(--surface3);color:var(--text2);}
.r3{background:rgba(196,149,106,0.2);color:var(--warm);}
.rn{background:transparent;color:var(--text3);}

/* ── CHART ── */
.chart-wrap{position:relative;}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:10px;}
.legend span{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px;}
.lsq{display:inline-block;width:10px;height:10px;border-radius:2px;flex-shrink:0;}

/* ── DONUT ── */
.donut-wrap{display:flex;align-items:center;gap:28px;padding:8px 0;}
.donut-canvas-wrap{width:120px;height:120px;flex-shrink:0;}
.donut-info .pct{font-size:38px;font-weight:700;line-height:1;letter-spacing:-0.02em;}
.donut-info .lbl{font-size:12px;color:var(--text3);margin-top:3px;margin-bottom:12px;}
.donut-info .det{font-size:13px;color:var(--text2);line-height:2;}

/* ── PLACEHOLDER ── */
.placeholder{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1rem;color:var(--text3);gap:10px;text-align:center;}
.placeholder p{font-size:15px;color:var(--text2);}
.pbtn{padding:9px 22px;background:var(--warm);color:#fff;border:none;border-radius:var(--r-sm);font-size:13px;cursor:pointer;font-family:'Jost',sans-serif;font-weight:500;}
.pbtn:hover{opacity:0.88;}

/* ── FC ── */
.fc-tabs{display:flex;gap:4px;margin-bottom:1rem;flex-wrap:wrap;}
.fc-tab{padding:4px 14px;border-radius:20px;border:1px solid var(--border2);background:var(--surface);font-size:11px;color:var(--text2);cursor:pointer;font-family:'Jost',sans-serif;}
.fc-tab.active{background:var(--warm);color:#fff;border-color:var(--warm);}
.fc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:12px;}
.fc-card{background:var(--surface);border-radius:var(--r);padding:16px;border:1px solid var(--border);}
.fc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.fc-cat{font-size:13px;font-weight:600;color:var(--text);}
.fc-pct{font-size:32px;font-weight:700;letter-spacing:-0.02em;margin-bottom:6px;}
.fc-pct.ok{color:var(--green);}
.fc-pct.warn{color:var(--red);}
.fc-vs{font-size:12px;color:var(--text2);margin-top:6px;}
.fc-meta{display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:2px;}
.pbar-bg{height:6px;background:var(--surface3);border-radius:3px;margin:6px 0 2px;}
.pbar-fill{height:6px;border-radius:3px;transition:width .3s;}
/* anciens styles compatibilité */
.fc-head{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;font-weight:600;}
.fc-val{font-size:30px;font-weight:700;letter-spacing:-0.02em;}
.fc-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;margin-left:6px;vertical-align:middle;}
.fc-bar-bg{height:5px;background:var(--surface3);border-radius:3px;margin:8px 0;}
.fc-bar{height:5px;border-radius:3px;transition:width .3s;}
.fc-detail{font-size:12px;color:var(--text2);display:flex;justify-content:space-between;}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;}
.badge.ok{background:var(--green-bg);color:var(--green-t);}
.badge.warn{background:var(--red-bg);color:var(--red-t);}

/* ── RATIO ── */
.ratio-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}
.ratio-card{background:var(--surface2);border-radius:var(--r-sm);padding:14px;position:relative;border:1px solid var(--border);}
.ratio-push{position:absolute;top:8px;right:8px;font-size:9px;font-weight:700;background:var(--red-bg);color:var(--red);padding:2px 6px;border-radius:3px;text-transform:uppercase;}
.ratio-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;font-weight:500;}
.ratio-val{font-size:24px;font-weight:700;letter-spacing:-0.02em;}
.ratio-pm{font-size:11px;color:var(--text3);margin-top:2px;margin-bottom:8px;}
.rbar-bg{height:4px;background:var(--surface3);border-radius:2px;}
.rbar-fill{height:4px;border-radius:2px;}

/* ── SERVICE BADGE ── */
.svc-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;font-weight:600;}
.svc-midi{background:var(--blue-bg);color:var(--blue-t);}
.svc-soir{background:var(--amber-bg);color:var(--amber-t);}
.up{color:var(--green);}.dn{color:var(--red);}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo-zone">
    <div class="logo-img">
      <!-- Logo BALM stylisé -->
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="36" height="36" rx="4" fill="rgba(196,149,106,0.15)"/>
        <text x="18" y="24" text-anchor="middle" font-family="Playfair Display, serif" font-size="15" font-weight="700" fill="#C4956A" letter-spacing="1">B</text>
        <rect x="6" y="30" width="24" height="1" fill="rgba(196,149,106,0.4)" rx="1"/>
      </svg>
    </div>
    <div class="logo-text">
      <div class="logo-main">Brasseries à la Mode</div>
      <div class="logo-sub">Dashboard interne</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showPage('perf',this)">Performance</button>
    <button class="nav-tab" onclick="showPage('malou',this)">Avis Google</button>
    <button class="nav-tab" onclick="showPage('produit',this)">Rapport Produit</button>
  </div>
  <div class="topbar-deco">« La brasserie simple comme on la rêve »</div>
</div>

<div class="upload-bar">
  <span class="upload-bar-label">Données</span>
  <button class="ubtn" id="ubtn-drive" onclick="loadFromDrive('week');loadFromDrive('month')" style="border-color:var(--accent);color:var(--warm);font-weight:600">🔄 Actualiser Drive</button>
  <button class="ubtn" id="ubtn-csv" onclick="document.getElementById('u-csv').click()">↑ CSV manuel</button>
  <!-- Excel Perf remplacé par CSV Drive -->
  <button class="ubtn" id="ubtn-malou" onclick="document.getElementById('u-malou').click()">↑ Malou CSV</button>
  <button class="ubtn ubtn-reset" id="ubtn-reset" onclick="resetCSV()">↺ Reset</button>
  <span class="ustatus" id="drive-status">⏳ Connexion Drive...</span>
</div>

<input type="file" id="u-csv" accept=".csv" multiple style="display:none" onchange="loadCSV(this)">
<input type="file" id="u-perf" accept=".xlsx,.xls" style="display:none" onchange="loadPerf(this)">
<input type="file" id="u-malou" accept=".csv" multiple style="display:none" onchange="loadMalou(this)">


<!-- PAGE PERFORMANCE -->
<div class="page active" id="page-perf">
  <div class="toolbar">
    <button class="rtab active" onclick="setResto('conso',this,'perf')">Consolidé</button>
    <button class="rtab" onclick="setResto('rosie',this,'perf')">Brasserie Rosie</button>
    <button class="rtab" onclick="setResto('lou',this,'perf')">Rosie Lou</button>
    <div class="sep"></div>
    <button class="vtab active" onclick="setView('semaine',this)">Vue semaine</button>
    <button class="vtab" onclick="setView('mois',this)">Vue mensuelle</button>
  </div>
  <div id="perf-content"><div style="padding:2rem;text-align:center;color:var(--text3)">Chargement…</div></div>
</div>

<!-- PAGE AVIS GOOGLE (MALOU) -->
<div class="page" id="page-malou">
  <div id="malou-content"></div>
</div>

<!-- PAGE RAPPORT PRODUIT -->
<div class="page" id="page-produit">
  <div class="toolbar">
    <button class="rtab active" id="prod-tab-rosie" onclick="setProdResto('rosie',this)">Brasserie Rosie</button>
    <button class="rtab" id="prod-tab-lou" onclick="setProdResto('lou',this)">Rosie Lou</button>
    <div class="sep"></div>
    <span style="font-size:12px;color:var(--text3)">📌 S13 2026 — S10·S11·S12·S13</span>
  </div>
  <div id="produit-content"><div style="padding:2rem;text-align:center;color:var(--text3)">Chargement…</div></div>
</div>

<script>
// ══════════════════════════════════
// CONFIG API DRIVE
// ══════════════════════════════════
// Enregistrer plugin datalabels pour Chart.js
if(typeof ChartDataLabels !== 'undefined') Chart.register(ChartDataLabels);

const DRIVE_API = 'https://script.google.com/macros/s/AKfycbyz11qosd7EGZsPHWR2-23z_aLghyZGpHE_zyqIznAQIvVf0zc1aaks0Yv8kVOokTDgEg/exec';

// ══════════════════════════════════
// STATE
// ══════════════════════════════════
const S = {
  perfResto:'conso', fcResto:'rosie', fcMonth:1, view:'semaine',
  tickets:[], transactions:[], ticketsPrev:[],
  ticketsMois:[], transactionsMois:[],  // données du mois entier (depuis Drive)
  fbData:null, peopleData:null,
  driveStatus:'idle', // idle | loading | ok | error
  // Données hebdo — hardcodées S12 2026, écrasées si Excel Perf uploadé
  // Source : RAPPORT_PERF_WEEKLY_CA_-_2026.xlsx lu le 24/03/2026
  perfData:{
    rosie:{ caHT:83.82, budget:82.63, n1:91.07, moy_3s:91.07, vs_budget:0.0144, vs_n1:-0.0796, vs_3s:-0.0796, couverts:2690, tm:34.84, semaine:15 },
    lou:  { caHT:62.03, budget:59.09, n1:65.34, moy_3s:65.34, vs_budget:0.0498, vs_n1:-0.0506, vs_3s:-0.0506, couverts:2152, tm:32.21, semaine:15 },
    conso:{ caHT:145.85,budget:141.72,n1:156.41,moy_3s:156.41,vs_budget:0.0291, vs_n1:-0.0675, vs_3s:-0.0675, couverts:4842, tm:33.55, semaine:15 }
  },
  loaded:{csv:false,fb:false,people:false,perf:false,drive:false},
  budgetMensuel:{rosie:{}, lou:{}}
};

const FC_SEUILS = {food:25,bar:18,vin:22,desserts:22};
const FC_BUDGET = {
  rosie:{food:26.0,bar:19.0,vin:24.1,desserts:21.3},
  lou:{food:25.1,bar:19.5,vin:24.1,desserts:21.3},
  conso:{food:25.6,bar:19.3,vin:24.1,desserts:21.3}
};
const FC_DATA = {
  rosie:[{food:26.3,bar:19.4,vin:19.3,desserts:21.1,total:24.1},{food:25.4,bar:17.6,vin:21.7,desserts:14.6,total:22.9}],
  lou:[{food:24.7,bar:22.9,vin:14.5,desserts:21.7,total:23.1},{food:25.7,bar:17.6,vin:20.0,desserts:15.3,total:23.1}]
};
FC_DATA.conso=FC_DATA.rosie.map((r,i)=>{const l=FC_DATA.lou[i];return{food:+((r.food+l.food)/2).toFixed(1),bar:+((r.bar+l.bar)/2).toFixed(1),vin:+((r.vin+l.vin)/2).toFixed(1),desserts:+((r.desserts+l.desserts)/2).toFixed(1),total:+((r.total+l.total)/2).toFixed(1)};});

// N-1 mensuel (2025) depuis ton fichier Excel
const N1_MENSUEL = {
  rosie:[370.9,350.5,399.9,354.2,324.3,313.4,272.6,214.2,348.3,417.1,407.6,430.8],
  lou:[265.4,244.6,277.7,244.0,213.1,221.9,192.8,131.4,226.0,276.0,278.0,300.3]
};
N1_MENSUEL.conso=N1_MENSUEL.rosie.map((v,i)=>+(v+N1_MENSUEL.lou[i]).toFixed(1));

// CA mensuel RÉEL 2026 — source : MONTHLY_ROSIE / MONTHLY_ROSIE_LOU (lu depuis Excel)
const CA_REEL_MENSUEL = {
  rosie:[382.3, 363.7, 381.1, 88.2, 0, 0, 0, 0, 0, 0, 0, 0],
  lou:  [277.0, 263.4, 271.7, 51.8, 0, 0, 0, 0, 0, 0, 0, 0]
};
CA_REEL_MENSUEL.conso = CA_REEL_MENSUEL.rosie.map((v,i)=>v>0&&CA_REEL_MENSUEL.lou[i]>0?+(v+CA_REEL_MENSUEL.lou[i]).toFixed(1):0);

// Budget mensuel 2026 — vrais chiffres lus depuis RAPPORT_PERF_WEEKLY_CA_-_2026.xlsx
// (feuilles MONTHLY_ROSIE / MONTHLY_ROSIE_LOU, colonne "Var Vs N-1" section budget)
const BUDGET_MENSUEL = {
  rosie:[387.2,374.1,420.1,381.1,355.5,313.9,272.9,246.0,363.3,426.3,417.1,460.6],
  lou:  [265.0,245.9,271.7,248.2,223.8,233.3,197.7,159.1,251.5,292.5,286.3,317.8]
};
BUDGET_MENSUEL.conso=BUDGET_MENSUEL.rosie.map((v,i)=>+(v+BUDGET_MENSUEL.lou[i]).toFixed(1));



// ══ DONNÉES FRÉQUENTATION ══
const FREQ_DATA = {
  semaines: [12,13,14,15],
  dates: ['17–23 mars','24–30 mars','31 mars–6 avr.','7–12 avr.'],

function loadCSV(input){
  const files=Array.from(input.files);
  if(!files.length)return;
  // On NE remet PAS à zéro — on accumule les nouveaux fichiers
  // (permet de charger tickets d'abord puis transactions, ou tout en même temps)
  let done=0;
  let newTickets=0, newTrans=0;
  files.forEach(file=>{
    const r=new FileReader();
    r.onload=e=>{
      const rows=parseCSV(e.target.result);
      if(!rows.length){done++;check();return;}
      const cols=rows[0];
      // Log debug
      console.log(`Fichier: ${file.name} | Colonnes: ${cols.slice(0,5).join(', ')}...`);
      // Détection : Couverts = tickets ; GroupeStatistique = transactions
      const fname=(file.name||'').toLowerCase();
      const fileResto=fname.includes('brasserierosielou')?'lou':fname.includes('rosiejolie')?'rosie_jolie':fname.includes('bigoudi')?'bigoudi':'rosie';
      const isTickets = cols.some(c=>c==='Couverts') || cols.some(c=>c==='Annulée');
      const isTransactions = cols.some(c=>c==='GroupeStatistique') || cols.some(c=>c==='Item');
      if(isTickets && !isTransactions){
        rows.slice(1).forEach(row=>{const o={};cols.forEach((c,i)=>o[c]=row[i]);o._resto=fileResto;S.tickets.push(o);});
        newTickets++;
        console.log(`  → TICKETS (${rows.length-1} lignes) [${fileResto}]`);
      } else if(isTransactions){
        rows.slice(1).forEach(row=>{const o={};cols.forEach((c,i)=>o[c]=row[i]);o._resto=fileResto;S.transactions.push(o);});
        newTrans++;
        console.log(`  → TRANSACTIONS (${rows.length-1} lignes) [${fileResto}]`);
      } else {
        console.log(`  → NON RECONNU, colonnes:`, cols.slice(0,8).join(', '));
      }
      done++;check();
    };
    r.readAsText(file,'UTF-8');
  });
  function check(){
    if(done===files.length){
      console.log(`Chargé: +${newTickets} fichiers tickets (total ${S.tickets.length} lignes), +${newTrans} fichiers transactions (total ${S.transactions.length} lignes)`);
      S.loaded.csv=true;updateStatus();renderPerf();
    }
  }
}

function parseCSV(text){
  // Nettoyer les retours chariot Windows
  text = text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
  const lines=text.split('\n').filter(l=>l.trim());
  return lines.map(line=>{
    const res=[];let cur='';let inQ=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"'){inQ=!inQ;}
      else if(line[i]===','&&!inQ){res.push(cur.trim());cur='';}
      else cur+=line[i];
    }
    res.push(cur.trim());
    return res;
  });
}

function parseExcelPerf(wb){
  // MAPPING CONFIRMÉ depuis analyse RAPPORT_PERF_WEEKLY_CA_-_2026.xlsx :
  // Row 155 (index 154) = CA HT synthèse semaine
  //   col[6]  = CA HT réel semaine
  //   col[9]  = VS Budget (%)
  //   col[10] = VS 3 dernières semaines (%)
  //   col[12] = VS N-1 (%)
  //   col[15] = Moyenne 3 dernières semaines (k€)
  //   col[17] = N-1 absolu (k€)
  //   col[19] = Budget absolu (k€)
  // Row 119 (index 118) : couverts → col[6]
  // Row 103 (index 102) : TM TTC   → col[6]
  // Row 2   (index 1)   : numéro semaine → col[6]
  //
  // MONTHLY sheets : Row 15 (index 14) = CA HT mensuel par mois
  //   col 6=Jan, 7=Fév, 8=Mar, ... (indices 0-based)

  for(const [sheet, key] of [['WEEKLY_ROSIE','rosie'],['WEEKLY_ROSIE_LOU','lou']]){
    const ws=wb.Sheets[sheet];
    if(!ws)continue;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    const rCaHT = rows[154]||[];
    const rCov  = rows[118]||[];
    const rTM   = rows[102]||[];
    const rSem  = rows[1]||[];

    const caHT      = typeof rCaHT[4]==='number' ? rCaHT[4] : 0;
    const vs_budget = typeof rCaHT[8]==='number' ? rCaHT[8] : 0;
    const vs_3s     = typeof rCaHT[9]==='number' ? rCaHT[9] : 0;
    const vs_n1     = typeof rCaHT[10]==='number'? rCaHT[10]: 0;
    const moy_3s    = typeof rCaHT[12]==='number'? rCaHT[12]: 0;
    const n1        = typeof rCaHT[16]==='number'? rCaHT[16]: 0;
    const budget    = typeof rCaHT[18]==='number'? rCaHT[18]: 0;
    const couverts  = typeof rCov[4]==='number'  ? rCov[4]  : 0;
    const tm        = typeof rTM[4]==='number'   ? rTM[4]   : 0;
    const semaine   = rSem[5] || '?';

    S.perfData[key]={ caHT, budget, n1, moy_3s, vs_budget, vs_n1, vs_3s, couverts, tm, semaine };
  }

  // Consolidé = somme des deux
  const r=S.perfData.rosie, l=S.perfData.lou;
  if(r && l && r.caHT>0 && l.caHT>0){
    const ca=r.caHT+l.caHT, bud=r.budget+l.budget, n1=r.n1+l.n1, m3s=r.moy_3s+l.moy_3s;
    S.perfData.conso={
      caHT    : ca,
      budget  : bud,
      n1      : n1,
      moy_3s  : m3s,
      vs_budget: bud>0 ? ca/bud-1 : 0,
      vs_n1   : n1>0  ? ca/n1-1  : 0,
      vs_3s   : m3s>0 ? ca/m3s-1 : 0,
      couverts: r.couverts+l.couverts,
      tm      : (r.couverts+l.couverts)>0 ? (ca*1000)/(r.couverts+l.couverts) : 0,
      semaine : r.semaine
    };
  }

  // Charger les données mensuelles réelles depuis MONTHLY_ROSIE / MONTHLY_ROSIE_LOU
  for(const [sheet, key] of [['MONTHLY_ROSIE','rosie'],['MONTHLY_ROSIE_LOU','lou']]){
    const ws=wb.Sheets[sheet];
    if(!ws)continue;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    const rCA = rows[14]||[]; // Row 15 = CA HT mensuel
    // cols 6=Jan, 7=Fév, 8=Mar, ..., 17=Déc
    for(let m=0;m<12;m++){
      const v = rCA[6+m];
      if(typeof v==='number' && v>0) CA_REEL_MENSUEL[key][m] = +v.toFixed(1);
    }
  }
  CA_REEL_MENSUEL.conso = CA_REEL_MENSUEL.rosie.map((v,i)=>
    v>0&&CA_REEL_MENSUEL.lou[i]>0 ? +(v+CA_REEL_MENSUEL.lou[i]).toFixed(1) : 0
  );
}

function parseFBFile(wb){
  function readSheet(sn,key){
    const ws=wb.Sheets[sn];if(!ws)return;
    const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null});
    const aRow=rows[3]||[],mRow=rows[4]||[];
    for(let m=0;m<12;m++){
      for(let c=4;c<aRow.length;c++){
        if(aRow[c]===2026&&mRow[c]===(m+1)){
          const food=rows[49]&&rows[49][c],bar=rows[50]&&rows[50][c];
          const vin=rows[51]&&rows[51][c],dessert=rows[55]&&rows[55][c];
          const total=rows[57]&&rows[57][c];
          if(food&&typeof food==='number'){
            if(!FC_DATA[key][m])FC_DATA[key][m]={};
            FC_DATA[key][m]={food:+(food*100).toFixed(1),bar:bar?+(bar*100).toFixed(1):0,vin:vin?+(vin*100).toFixed(1):0,desserts:dessert?+(dessert*100).toFixed(1):0,total:total?+(total*100).toFixed(1):0};
          }
          break;
        }
      }
    }
  }
  readSheet('2_ROSIE','rosie');readSheet('2_ROSIE_LOU','lou');
  FC_DATA.conso=Array.from({length:12},(_,i)=>{
    if(!FC_DATA.rosie[i]||!FC_DATA.lou[i])return null;
    const r=FC_DATA.rosie[i],l=FC_DATA.lou[i];
    return{food:+((r.food+l.food)/2).toFixed(1),bar:+((r.bar+l.bar)/2).toFixed(1),vin:+((r.vin+l.vin)/2).toFixed(1),desserts:+((r.desserts+l.desserts)/2).toFixed(1),total:+((r.total+l.total)/2).toFixed(1)};
  }).filter(Boolean);
  updateFCTabs();
}

async function loadPrevTickets(){
  // Charge les tickets du 30-31 mars uniquement pour le graphique CA/jour
  // Ne touche à rien d'autre que S.ticketsPrev
  try {
    if(!getDateNDaysAgo) return;
    const since = getDateNDaysAgo(14); // 14 jours en arrière
    const url = `${DRIVE_API}?action=since&since=${since}`;
    const res = await fetch(url, {redirect:'follow'});
    const data = await res.json();
    if(!data || data.error) return;
    const tickets = [];
    (data.tickets||[]).forEach(f=>{
      if(!f.content) return;
      const fname=(f.name||'').toLowerCase();
      const fileResto=fname.includes('brasserierosielou')?'lou':'rosie';
      const rows=parseCSV(f.content);
      if(!rows.length) return;
      const cols=rows[0];
      const isT=cols.some(c=>c==='Couverts')||cols.some(c=>c==='Annulée');
      if(isT) rows.slice(1).forEach(r=>{const o={};cols.forEach((c,i)=>o[c]=r[i]);o._resto=fileResto;tickets.push(o);});
    });
    S.ticketsPrev = tickets;
    console.log('[loadPrevTickets] Chargé:', tickets.length, 'tickets (14j)');
    renderPerf(); // Re-render pour mettre à jour le graphique
  } catch(e) {
    console.warn('[loadPrevTickets] Échec:', e.message);
  }
}


async function loadFromDrive(mode){
  S.driveStatus='loading';
  updateDriveStatus('⏳ Connexion Drive...');
  try {
    // Google Apps Script supporte le mode no-cors via redirect
    // On utilise fetch avec mode no-cors puis on reparse
    const url = `${DRIVE_API}?action=${mode}`;
    
    let data;
    try {
      // Tentative directe (fonctionne depuis Netlify/serveur)
      const res = await fetch(url, {redirect:'follow'});
      data = await res.json();
    } catch(corsErr) {
      // Fallback : ouvrir l'URL dans un iframe caché et lire via message
      console.warn('CORS bloqué, tentative via proxy...');
      data = await fetchViaProxy(url);
    }

    if(!data || data.error) throw new Error(data?.error || 'Réponse invalide');

    const tickets=[], trans=[];
    (data.tickets||[]).forEach(f=>{
      if(!f.content)return;
      const fname=(f.name||'').toLowerCase();
      const fileResto=fname.includes('brasserierosielou')?'lou':fname.includes('rosiejolie')?'rosie_jolie':fname.includes('bigoudi')?'bigoudi':'rosie';
      const rows=parseCSV(f.content);
      if(!rows.length)return;
      const cols=rows[0];
      const isT=cols.some(c=>c==='Couverts')||cols.some(c=>c==='Annulée');
      if(isT) rows.slice(1).forEach(r=>{const o={};cols.forEach((c,i)=>o[c]=r[i]);o._resto=fileResto;tickets.push(o);});
    });
    (data.transactions||[]).forEach(f=>{
      if(!f.content)return;
      const fname=(f.name||'').toLowerCase();
      const fileResto=fname.includes('brasserierosielou')?'lou':fname.includes('rosiejolie')?'rosie_jolie':fname.includes('bigoudi')?'bigoudi':'rosie';
      const rows=parseCSV(f.content);
      if(!rows.length)return;
      const cols=rows[0];
      const isTr=cols.some(c=>c==='GroupeStatistique')||cols.some(c=>c==='Item');
      if(isTr) rows.slice(1).forEach(r=>{const o={};cols.forEach((c,i)=>o[c]=r[i]);o._resto=fileResto;trans.push(o);});
    });

    if(mode==='week'){
      S.tickets=tickets; S.transactions=trans;
      S.loaded.csv=true;
    } else {
      S.ticketsMois=tickets; S.transactionsMois=trans;
    }
    S.loaded.drive=true;
    S.driveStatus='ok';
    const nb_t = tickets.length, nb_tr = trans.length;
    updateDriveStatus(`✅ Drive — ${nb_t} tickets · ${nb_tr} transac. (${mode==='week'?'semaine':'mois'})`);
    renderPerf();

  } catch(err){
    S.driveStatus='error';
    updateDriveStatus(`⚠️ Drive non accessible en local — uploadez vos CSV manuellement`);
    console.warn('Drive non accessible:', err.message);
  }
}

function parseDate(str){
  if(!str)return null;
  const m=String(str).match(/(\d+)\/(\d+)\/(\d+)\s+(\d+):(\d+)/);
  if(!m)return null;
  const[,d,mo,y,h,mn]=m;
  return new Date(2000+parseInt(y),parseInt(mo)-1,parseInt(d),parseInt(h),parseInt(mn));
}
function getService(t){
  const d=parseDate(t['Date']||t['OpenDate']);
  if(!d)return'Midi';
  return d.getHours()<16?'Midi':'Soir';
}
function isWeekend(t){
  const d=parseDate(t['Date']||t['OpenDate']);
  if(!d)return false;
  return d.getDay()===0||d.getDay()===6;
}
function getRestaurantTrans(t){
  // Device_Name identifie le restaurant :
  // Ipad(1014177) = Brasserie Rosie | iPad34(854845) = Rosie Lou
  const dev=(t['Device_Name']||'').toLowerCase();
  if(dev.includes('854845'))return'lou';
  if(dev.includes('1014177'))return'rosie';
  // Fallback sur Group/AccountName
  const g=(t['Group']||'').toLowerCase();
  const acc=(t['AccountName']||'').toLowerCase();
  if(g.includes('rosielou')||g.includes('rosie lou')||acc.includes('verrière')||acc.includes('arrière'))return'lou';
  return'rosie';
}
function getRestoFromTicket(t){
  if(t._resto)return t._resto;
  const dev=(t['Device_Name']||'').toLowerCase();
  if(dev.includes('854845'))return'lou';
  if(dev.includes('1014177'))return'rosie';
  const acc=t['AccountName']||'';
  if(acc.includes('Verrière')||acc.includes('Mezzanine')||acc.includes('arrière'))return'lou';
  return'rosie';
}
function filterTickets(resto){
  const valid=S.tickets.filter(t=>t['Annulée']==='Non'&&parseFloat(t['Total']||0)>0);
  if(resto==='conso')return valid;
  return valid.filter(t=>getRestoFromTicket(t)===resto);
}
function filterTrans(resto){
  if(resto==='conso')return S.transactions;
  return S.transactions.filter(t=>(t._resto||getRestaurantTrans(t))===resto);
}
function getDateNDaysAgo(n){
  const d=new Date();d.setDate(d.getDate()-n);
  return d.getFullYear()+String(d.getMonth()+1).padStart(2,'0')+String(d.getDate()).padStart(2,'0');
}

function getDates(){
  const dates=S.tickets.map(t=>parseDate(t['Date']||t['OpenDate'])).filter(Boolean);
  if(!dates.length)return{min:null,max:null,weekNum:null,monthNum:null};
  const mn=new Date(Math.min(...dates)),mx=new Date(Math.max(...dates));
  // Numéro de semaine ISO
  const d=new Date(mn);d.setHours(0,0,0,0);d.setDate(d.getDate()+3-(d.getDay()+6)%7);
  const wk=new Date(d.getFullYear(),0,4);
  const weekNum=1+Math.round(((d-wk)/86400000-3+(wk.getDay()+6)%7)/7);
  return{min:mn,max:mx,weekNum,monthNum:mn.getMonth()+1};
}
function fmtDate(d){if(!d)return'';return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'short'});}
function fmtN(n,dec=0){return typeof n==='number'?n.toLocaleString('fr-FR',{minimumFractionDigits:dec,maximumFractionDigits:dec}):'—';}
function varHtml(v,suffix='%',invert=false){
  const pos=invert?v<=0:v>=0;
  const cls=pos?'up':'dn';
  const sym=v>=0?'+':'';
  return`<span class="${cls}">${sym}${fmtN(v,1)}${suffix}</span>`;
}

// Helpers pour filtrer des listes de tickets/transactions (sans dépendre de S.tickets)
function filterTicketsList(list, resto){
  const valid = list.filter(t=>t['Annulée']==='Non'&&parseFloat(t['Total']||0)>0);
  if(resto==='conso') return valid;
  return valid.filter(t=>{
    const dev=(t['Device_Name']||'').toLowerCase();
    if(resto==='lou') return dev.includes('854845');
    return dev.includes('1014177');
  });
}
function filterTransList(list, resto){
  if(resto==='conso') return list;
  return list.filter(t=>{
    const dev=(t['Device_Name']||'').toLowerCase();
    if(resto==='lou') return dev.includes('854845');
    return dev.includes('1014177');
  });
}

function cleanCDRName(s){
  if(!s||typeof s!=='string')return null;
  if(!s.toUpperCase().includes('CDR')&&!s.includes('CdR'))return null;
  return s.replace(/\s*\(\d+\)/g,'').replace(/\s*(CDR|CdR)\s*/gi,' ')
          .replace(/Messaoudene/gi,'').replace(/\bBUNO\b/gi,'').replace(/\bAUGE\b/gi,'')
          .replace(/\s+/g,' ').trim();
}

function renderCDRSection(tickets, trans){
  const CATS=['PLAT','ENTREE','DESSERT','VIN','VIN AU VERRE','COCKTAIL','ALCOOL','SOFT'];
  const LABELS={'PLAT':'Plat','ENTREE':'Entree','DESSERT':'Dessert','VIN':'Vin bouteille',
                'VIN AU VERRE':'Vin verre','COCKTAIL':'Cocktail','ALCOOL':'Alcool','SOFT':'Soft'};

  // 1. TM/couverts par CDR par service
  const svcMap={};
  tickets.filter(t=>(t['Cree par']||t['Créé par']||'').toUpperCase().includes('CDR')&&t['Annulee']==='Non'||
                    (t['Créé par']||'').toUpperCase().includes('CDR')&&t['Annulée']==='Non').forEach(t=>{
    const nom=cleanCDRName(t['Créé par']||t['Cree par']);
    if(!nom)return;
    const d=parseDate(t['Date']||t['OpenDate']);if(!d)return;
    const h=d.getHours(),wd=d.getDay(),isWE=(wd===0||wd===6);
    const svc=(h<16?'Midi':'Soir')+(isWE?' WE':' Sem');
    const k=nom+'|'+svc;
    if(!svcMap[k])svcMap[k]={nom,svc,ca:0,cv:0,nb:0,offerts:0};
    svcMap[k].ca+=parseFloat(t['Total']||0);
    svcMap[k].cv+=parseFloat(t['Couverts']||0);
    svcMap[k].nb++;
    svcMap[k].offerts+=parseFloat(t['Offert']||0);
  });

  // 2. Couverts totaux + transactions par CDR
  const covMap={};
  const transMap={};
  tickets.filter(t=>(t['Créé par']||'').toUpperCase().includes('CDR')&&t['Annulée']==='Non').forEach(t=>{
    const nom=cleanCDRName(t['Créé par']);if(!nom)return;
    if(!covMap[nom])covMap[nom]=0;
    covMap[nom]+=parseFloat(t['Couverts']||0);
  });
  trans.forEach(t=>{
    const nom=cleanCDRName(t['Staff']);if(!nom)return;
    const cat=t['GroupeStatistique']||'';if(!CATS.includes(cat))return;
    const k=nom+'|'+cat;
    if(!transMap[k])transMap[k]={nom,cat,qty:0,ca:0};
    transMap[k].qty+=parseFloat(t['Qty']||0);
    transMap[k].ca+=parseFloat(t['FinalPrice']||0);
  });

  const SVC_KEYS=['Midi Sem','Soir Sem','Midi WE','Soir WE'];

  // Moyennes équipe par service
  const moyEq={};
  SVC_KEYS.forEach(svc=>{
    const vals=Object.values(svcMap).filter(x=>x.svc===svc&&x.cv>0).map(x=>x.ca/x.cv);
    moyEq[svc]=vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:0;
  });

  // Totaux par CDR
  const totCDR={};
  Object.values(svcMap).forEach(x=>{
    if(!totCDR[x.nom])totCDR[x.nom]={ca:0,cv:0,offerts:0};
    totCDR[x.nom].ca+=x.ca;totCDR[x.nom].cv+=x.cv;totCDR[x.nom].offerts+=x.offerts;
  });

  // Dataset pour tri
  const cdrData=Object.keys(totCDR).map(nom=>{
    const tot=totCDR[nom];
    const svcs={};
    SVC_KEYS.forEach(svc=>{const d=svcMap[nom+'|'+svc];svcs[svc]=d&&d.cv>0?{tm:d.ca/d.cv,cv:d.cv}:null;});
    return{nom,tm:tot.cv>0?tot.ca/tot.cv:0,cv:tot.cv,ca:tot.ca,offerts:tot.offerts,svcs};
  });
  cdrData.sort((a,b)=>b.ca-a.ca);

  const TID='cdr_'+Math.random().toString(36).slice(2,7);
  window._CDR_DATA=cdrData;
  window._CDR_MOY=moyEq;
  window._CDR_SVKS=SVC_KEYS;
  window._CDR_TID=TID;
  window._CDR_SC=6;
  window._CDR_SD=-1;

  function buildRows(data){
    return data.map((row,i)=>{
      const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      let tr='<tr><td><span class="rank '+rc+'">'+(i+1)+'</span> <b>'+row.nom+'</b></td>';
      SVC_KEYS.forEach(svc=>{
        const d=row.svcs[svc];
        const above=d&&moyEq[svc]>0&&d.tm>moyEq[svc]*1.05;
        tr+=d?('<td class="r" style="color:'+(above?'var(--green)':'var(--text)')+'"><b>'+fmtN(d.tm,2)+'&#x20AC;</b><br><small style="color:var(--text3)">'+fmtN(d.cv)+' cv</small></td>')
            :'<td class="r" style="color:var(--text3)">&#x2014;</td>';
      });
      tr+='<td class="r">'+fmtN(row.cv)+'</td>'
         +'<td class="r">'+fmtN(row.ca/1000,1)+' k&#x20AC;</td>'
         +'<td class="r" style="color:'+(row.offerts>0?'var(--red)':'var(--text3)')+'">'+fmtN(row.offerts,0)+' &#x20AC;</td></tr>';
      return tr;
    }).join('');
  }

  function thS(col,lbl,badge){
    return '<th class="r" style="cursor:pointer;user-select:none;white-space:nowrap" onclick="cdrSort('+col+')">'
      +(badge?'<span class="svc-badge '+badge+'">'+lbl+'</span>':lbl)

    +SVC_KEYS.map(svc=>'<td class="r">'+(moyEq[svc]>0?fmtN(moyEq[svc],2)+'&#x20AC;':'&#x2014;')+'</td>').join('')
    +'<td colspan="3"></td></tr></tfoot>'
    +'</table></div>';

  setTimeout(function(){const e=document.getElementById('si_'+TID+'_6');if(e)e.textContent=' ↓';},80);

  // Tableau 2 : Taux de prise par CDR
  const allCDRTrans=[...new Set(Object.values(transMap).map(x=>x.nom))]
    .filter(nom=>CATS.some(cat=>transMap[nom+'|'+cat]&&transMap[nom+'|'+cat].qty>0)).sort();

  if(allCDRTrans.length>0){
    const moyRatio={};
    CATS.forEach(cat=>{
      const totalQty=Object.values(transMap).filter(x=>x.cat===cat).reduce((s,x)=>s+x.qty,0);
      const totalCov=Object.values(covMap).reduce((s,v)=>s+v,0);
      moyRatio[cat]=totalCov>0?totalQty/totalCov:0;
    });
    html+='<div class="card" style="overflow-x:auto;margin-top:12px">'
      +'<div class="card-title">Taux de prise par chef de rang &#x2014; qui pousse quoi ?</div>'
      +'<table class="tbl"><thead><tr>'
      +'<th>Chef de rang</th><th class="r">Couverts</th>'
      +CATS.map(c=>'<th class="r" style="font-size:10px">'+LABELS[c]+'</th>').join('')
      +'</tr></thead><tbody>';
    allCDRTrans.forEach(nom=>{
      const cov=covMap[nom]||0;
      html+='<tr><td><b>'+nom+'</b></td><td class="r">'+fmtN(cov)+'</td>';
      CATS.forEach(cat=>{
        const d=transMap[nom+'|'+cat];
        const qty=d?d.qty:0,ratio=cov>0?qty/cov:0,moy=moyRatio[cat];
        const above=moy>0&&ratio>moy*1.1,below=moy>0&&ratio<moy*0.8;
        const color=above?'var(--green)':below?'var(--red)':'var(--text)';
        const bg=above?'var(--green-bg)':below?'var(--red-bg)':'transparent';
        html+='<td class="r" style="color:'+color+';background:'+bg+'">'
          +(cov>0?(ratio*100).toFixed(0)+'%':'&#x2014;')
          +(qty>0?'<br><small style="color:var(--text3)">'+fmtN(qty,0)+'</small>':'')
          +'</td>';
      });
      html+='</tr>';
    });
    html+='<tr class="avg-row"><td>Moy. equipe</td><td class="r">&#x2014;</td>';
    CATS.forEach(cat=>{const r=moyRatio[cat];html+='<td class="r">'+(r>0?(r*100).toFixed(0)+'%':'&#x2014;')+'</td>';});
    html+='</tr></tbody></table>'
      +'<p style="font-size:11px;color:var(--text3);margin-top:8px">&#x1F7E2; +10% vs moy. equipe &nbsp;&#x00B7;&nbsp; &#x1F534; -20% vs moy. equipe</p>'
      +'</div>';
  }

  return html;
}

function renderRatiosSection(trans,totalCouverts){
  if(!totalCouverts||!trans.length)return'';
  const CATS=['PLAT','ENTRÉE','DESSERT','VIN','VIN AU VERRE','COCKTAIL','ALCOOL','SOFT'];
  const LABELS={'PLAT':'Plat','ENTRÉE':'Entrée','DESSERT':'Dessert','VIN':'Bouteille vin','VIN AU VERRE':'Vin au verre','COCKTAIL':'Cocktail','ALCOOL':'Alcool','SOFT':'Soft'};
  const TARGETS={'PLAT':0.95,'ENTRÉE':0.50,'DESSERT':0.45,'VIN':0.05,'VIN AU VERRE':0.20,'COCKTAIL':0.15,'ALCOOL':0.20,'SOFT':0.40};
  const COLORS={'PLAT':'#378ADD','ENTRÉE':'#1D9E75','DESSERT':'#BA7517','VIN':'#D4537E','VIN AU VERRE':'#8B5CF6','COCKTAIL':'#F59E0B','ALCOOL':'#EF4444','SOFT':'#06B6D4'};

  let html=`<div class="card"><div class="card-title">Taux de prise & prix moyens — ce qu'il faut pousser</div><div class="ratio-grid">`;
  CATS.forEach(cat=>{
    const items=trans.filter(t=>(t['GroupeStatistique']||'')===cat);
    const qty=items.reduce((s,t)=>s+parseFloat(t['Qty']||0),0);
    const ca=items.reduce((s,t)=>s+parseFloat(t['FinalPrice']||0),0);
    const ratio=totalCouverts>0?qty/totalCouverts:0;
    const pm=qty>0?ca/qty:0;
    const target=TARGETS[cat]||0.5;
    const isLow=ratio<target*0.85;
    const pct=Math.min(ratio/target*100,100);
    const color=COLORS[cat]||'#378ADD';
    html+=`<div class="ratio-card">
      ${isLow?`<div class="ratio-push">↑ à pousser</div>`:''}
      <div class="ratio-lbl">${LABELS[cat]}</div>
      <div class="ratio-val" style="color:${isLow?'var(--red)':'var(--text)'}">${(ratio*100).toFixed(0)}%</div>
      <div class="ratio-pm">${fmtN(pm,2)}€ moy · ${fmtN(qty)} vendus</div>
      <div class="rbar-bg"><div class="rbar-fill" style="width:${pct.toFixed(0)}%;background:${isLow?'var(--red)':color}"></div></div>
    </div>`;
  });
  html+='</div></div>';
  return html;
}

function loadMalou(input){
  // Parse les CSV Malou uploadés
  const files = Array.from(input.files);
  let done = 0;
  files.forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      parseMalouCSV(e.target.result, file.name);
      done++;
      if(done === files.length){
        document.getElementById('ubtn-malou').classList.add('loaded');
        renderMalou();
      }
    };
    r.readAsText(file, 'UTF-8');
  });
}

function parseMalouCSV(text, filename){
  const isLou = filename.toLowerCase().includes('lou');
  const key = isLou ? 'lou' : 'rosie';
  const lines = text.split('\n').filter(l => l.trim());
  const header = lines[0].split(',');
  const periode = header[1] || '';
  MALOU_DATA.periode = periode.trim();

  lines.slice(1).forEach(line => {
    const cols = line.split(',');
    const label = cols[0]?.trim();
    const val2026 = cols[1]?.trim();
    const valn1   = cols[2]?.trim();

    const num = v => parseFloat(v?.replace('%','').replace('pts',''));

    if(label === 'Note Google') MALOU_DATA[key].note_google = num(val2026);
    else if(label === 'Note TripAdvisor') MALOU_DATA[key].note_tripadvisor = num(val2026);
    else if(label === "Nombre d'avis reçus"){ MALOU_DATA[key].nb_avis = num(val2026); MALOU_DATA[key].nb_avis_n1 = num(valn1); }
    else if(label === 'Note moyenne des avis reçus'){ MALOU_DATA[key].note_moy_avis = num(val2026); MALOU_DATA[key].note_moy_n1 = num(valn1); }
    else if(label === 'Proportion d\'avis 5 étoiles'){ MALOU_DATA[key].pct_5etoiles = num(val2026); MALOU_DATA[key].pct_5etoiles_n1 = num(valn1); }
    else if(label === 'Taux de réponse aux avis'){ MALOU_DATA[key].taux_reponse = num(val2026); MALOU_DATA[key].taux_reponse_n1 = num(valn1); }
    else if(label === 'Temps de réponse') MALOU_DATA[key].temps_reponse = val2026;
    else if(label === '% de sentiments positifs dans les avis') MALOU_DATA[key].pct_positif = num(val2026);
    else if(label === '% de sentiments négatifs dans les avis') MALOU_DATA[key].pct_negatif = num(val2026);
    else if(label === 'Total Apparitions'){ MALOU_DATA[key].apparitions_total = num(val2026); MALOU_DATA[key].apparitions_total_n1 = num(valn1); }
    else if(label === 'Total apparitions Maps') MALOU_DATA[key].apparitions_maps = num(val2026);
    else if(label === 'Total apparitions Recherche') MALOU_DATA[key].apparitions_recherche = num(val2026);
    else if(label === 'Total Actions'){ MALOU_DATA[key].actions_total = num(val2026); MALOU_DATA[key].actions_n1 = num(valn1); }
    else if(label === 'Taux de conversion') MALOU_DATA[key].taux_conversion = num(val2026);
    else if(label === 'Total appels') MALOU_DATA[key].appels = num(val2026);
    else if(label === "Total demandes d'itinéraire") MALOU_DATA[key].itineraires = num(val2026);
    else if(label === 'Total visites site web') MALOU_DATA[key].visites_web = num(val2026);
    else if(label === 'Abonnés Instagram') MALOU_DATA[key].abonnes_instagram = num(val2026);
  });
}

function renderPeople(){
  const MOIS=['Jan','Fév','Mar','Avr','Mai','Jun','Jul','Aoû','Sep','Oct','Nov','Déc'];
  const MOIS_FULL=['jan','fev','mar','avr','mai','jun','jul','aou','sep','oct','nov','dec'];
  const resto = S.pcResto || 'conso';
  const d = PC_DATA[resto];

  // Trouver le dernier mois avec données réelles
  let lastMois = 0;
  d.reel.forEach((v,i)=>{ if(v!=null) lastMois=i; });
  const moisLabel = MOIS[lastMois];
  const moisKey = MOIS_FULL[lastMois];

  const reel   = d.reel[lastMois];
  const budget = d.budget[lastMois];
  const pctR   = d.pct_reel[lastMois];
  const pctB   = d.pct_budget[lastMois];
  const caR    = d.ca_reel[lastMois];
  const deltaPct = pctR && pctB ? (pctR - pctB)*100 : null;
  const deltaK   = reel && budget ? reel - budget : null;
  const seuil  = PC_SEUIL[resto];
  const overSeuil = pctR > seuil;
  const emoji  = overSeuil ? '🌧️' : '🌞';

  // Détail par pôle
  const det = (resto!=='conso') ? (d.detail[moisKey]||null) : null;
  const detRosie = PC_DATA.rosie.detail[moisKey]||{};
  const detLou   = PC_DATA.lou.detail[moisKey]||{};

  const POLES = ['salle','cuisine','bar','patisserie'];
  const POLE_LABELS = {salle:'Salle',cuisine:'Cuisine',bar:'Bar',patisserie:'Pâtisserie'};
  const POLE_COLORS = {salle:'#5B8FD4',cuisine:'#C96A3A',bar:'#8B5CF6',patisserie:'#D4537E'};

  let html = `
  <div class="toolbar">
    <button class="rtab ${!S.pcResto||S.pcResto==='conso'?'active':''}" onclick="S.pcResto='conso';renderPeople()">Consolidé</button>

    <div class="sep"></div>
    <span style="font-size:12px;color:var(--text3)">📌 ${moisLabel} 2026 — mettez à jour via ↑ People (Excel)</span>
  </div>

  <div class="banner section" style="justify-content:space-between">
    <span>People Cost — ${moisLabel} 2026 · ${resto==='conso'?'Consolidé':resto==='rosie'?'Brasserie Rosie':'Rosie Lou'}</span>
    <span style="font-size:11px;opacity:0.7">Données hardcodées Fév 2026</span>
  </div>

  ${overSeuil
    ? `<div class="banner warn">🌧️ People Cost à <strong>${(pctR*100).toFixed(1)}%</strong> — au-dessus du seuil cible de ${(seuil*100).toFixed(0)}%</div>`
    : `<div class="banner ok">🌞 People Cost à <strong>${(pctR*100).toFixed(1)}%</strong> — dans la cible (seuil ${(seuil*100).toFixed(0)}%)</div>`
  }

  <div class="row col4">
    <div class="kpi">
      <div class="kpi-lbl">People Cost réel</div>
      <div class="kpi-val">${reel?reel.toFixed(0):'-'} k€</div>
      <div class="kpi-sub">Budget : ${budget?budget.toFixed(0):'-'} k€ · écart : <strong class="${deltaK>0?'dn':'up'}">${deltaK!=null?(deltaK>0?'+':'')+deltaK.toFixed(1)+' k€':'—'}</strong></div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">% du CA HT ${emoji}</div>
      <div class="kpi-val ${overSeuil?'dn':'up'}">${pctR?(pctR*100).toFixed(1)+'%':'-'}</div>
      <div class="kpi-sub">Budget : ${pctB?(pctB*100).toFixed(1)+'%':'—'} · écart : <strong class="${deltaPct>0?'dn':'up'}">${deltaPct!=null?(deltaPct>0?'+':'')+deltaPct.toFixed(1)+' pts':'—'}</strong></div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">CA HT du mois</div>
      <div class="kpi-val">${caR?caR.toFixed(0):'-'} k€</div>
      <div class="kpi-sub">Base de calcul People Cost</div>
    </div>
    <div class="kpi">
      <div class="kpi-lbl">Seuil cible</div>
      <div class="kpi-val" style="font-size:22px;padding-top:4px">${(seuil*100).toFixed(0)}%</div>
      <div class="kpi-sub">${overSeuil?`🌧️ Dépassé de ${deltaPct!=null?'+'+deltaPct.toFixed(1)+' pts':'—'}`:'🌞 Respecté'}</div>
    </div>
  </div>

  <div class="row col2">
    <div class="card">
      <div class="card-title">Détail par pôle — ${moisLabel} 2026</div>
      <table class="tbl">
        <thead><tr>
          <th>Pôle</th>

              ${resto==='conso'?`<td class="r" style="font-size:12px">${detRosie[p]?(detRosie[p]*100).toFixed(1)+'%':'—'}</td><td class="r" style="font-size:12px">${detLou[p]?(detLou[p]*100).toFixed(1)+'%':'—'}</td>`:''}

              <td class="r" style="color:var(--text3)">${(cible*100).toFixed(1)}%</td>
              <td class="r" style="color:${over?'var(--red)':'var(--green)'}"><b>${ecart!=null?(ecart>0?'+':'')+ecart.toFixed(1)+' pts':'—'}</b></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div class="card">
      <div class="card-title">Évolution People Cost % CA</div>
      <div class="legend">
        <span><span class="lsq" style="background:var(--warm)"></span>Réel</span>
        <span><span class="lsq" style="background:rgba(196,149,106,0.5);border:1px solid var(--accent)"></span>Budget</span>
        <span><span class="lsq" style="background:var(--red);opacity:0.4"></span>Seuil ${(seuil*100).toFixed(0)}%</span>
      </div>
      <div class="chart-wrap" style="height:200px"><canvas id="chart-pc-trend"></canvas></div>
    </div>
  </div>`;

  // Graphique évolution YTD
  const avail = d.reel.map((v,i)=>v!=null?i:null).filter(x=>x!==null);
  html += `
  <div class="card">
    <div class="card-title">Masse salariale mensuelle — Réel vs Budget (k€)</div>
    <div class="chart-wrap" style="height:200px"><canvas id="chart-pc-ms"></canvas></div>
  </div>`;

  document.getElementById('people-content').innerHTML = html;

  setTimeout(()=>{
    // Graphique % évolution
    destroyChart('pc-trend');
    const ctx1 = document.getElementById('chart-pc-trend');
    if(ctx1) charts['pc-trend'] = new Chart(ctx1,{
      type:'line',
      data:{
        labels: avail.map(i=>MOIS[i]),
        datasets:[
          {label:'Réel',data:avail.map(i=>d.pct_reel[i]?+(d.pct_reel[i]*100).toFixed(1):null),borderColor:'var(--warm)',backgroundColor:'rgba(107,58,48,0.08)',borderWidth:2.5,pointRadius:5,pointBackgroundColor:'var(--warm)',tension:0.2,fill:true},
          {label:'Budget',data:avail.map(i=>d.pct_budget[i]?+(d.pct_budget[i]*100).toFixed(1):null),borderColor:'rgba(196,149,106,0.8)',borderWidth:1.5,pointRadius:4,borderDash:[4,3],tension:0.2,fill:false},

      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.dataset.label+' : '+c.parsed.y.toFixed(1)+'%'}}},scales:{y:{min:35,max:55,ticks:{callback:v=>v+'%',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},x:{ticks:{font:{size:11}},grid:{display:false}}}}

    destroyChart('pc-ms');

    if(ctx2) charts['pc-ms'] = new Chart(ctx2,{
      type:'bar',

          {label:'Budget',data:avail.map(i=>d.budget[i]),backgroundColor:'rgba(196,149,106,0.3)',borderColor:'rgba(196,149,106,0.7)',borderWidth:1,borderRadius:4},

    {key:'soirSem',label:'Soir Sem', badge:'svc-soir'},
    {key:'midiWE', label:'Midi WE',  badge:'svc-midi'},
    {key:'soirWE', label:'Soir WE',  badge:'svc-soir'}
  ];

  function buildServiceRows(){
    const covSvc={};
    SVCS_TP.forEach(sv=>{
      covSvc[sv.key]=(fd[sv.key]&&fd[sv.key].couverts&&fd[sv.key].couverts.n2026&&fd[sv.key].couverts.n2026[SI])||0;
    });
    const covTotal=Object.values(covSvc).reduce((s,v)=>s+v,0);
    let rows='<tr class="avg-row"><td style="font-size:10px;color:var(--text3)">Couverts S'+sems[SI]+'</td>'
      +SVCS_TP.map(sv=>'<td class="r" style="font-size:11px;font-weight:600">'+Math.round(covSvc[sv.key])+'</td>').join('')
      +'<td class="r" style="font-size:11px;font-weight:600">'+Math.round(covTotal)+'</td><td></td></tr>';
    TP_CATS.forEach(cat=>{
      const d=tp[cat.key];if(!d)return;
      const vsGlobal=d.n2026[SI],vn1=d.n2025[SI];
      rows+='<tr><td><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:'+cat.color+';margin-right:6px;vertical-align:middle"></span><strong>'+cat.label+'</strong></td>';
      SVCS_TP.forEach(sv=>{
        const cov=covSvc[sv.key];
        rows+='<td class="r">'+(cov>0?Math.round(vsGlobal*cov)+' <small style="color:var(--text3)">/ '+Math.round(cov)+'</small>':'—')+'</td>';
      });
      rows+='<td class="r"><strong style="color:var(--warm)">'+(vsGlobal*100).toFixed(0)+'%</strong></td>'
           +'<td class="r" style="color:var(--text3)">'+(vn1*100).toFixed(0)+'%</td></tr>';
    });
    return '<table class="tbl"><thead><tr><th>Categorie</th>'
      +SVCS_TP.map(sv=>'<th class="r" style="font-size:9px"><span class="svc-badge '+sv.badge+'">'+sv.label+'</span></th>').join('')
      +'<th class="r" style="color:var(--warm);font-size:9px">Global</th>'
      +'<th class="r" style="color:var(--text3);font-size:9px">N-1</th>'
      +'</tr></thead><tbody>'+rows+'</tbody></table>';
  }

  const btnA='padding:4px 12px;border-radius:4px;border:1px solid var(--warm);background:var(--warm);font-size:11px;cursor:pointer;font-weight:600;color:#fff';
  const btnI='padding:4px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);font-size:11px;cursor:pointer;font-weight:500;color:var(--text2)';

  return '<div class="card" style="margin-top:12px">'
    +'<div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">'
    +'<div class="card-title" style="margin:0">Taux de prise \u2014 S'+sems[SI]+' vs S'+sems[SI-1]+' vs N-1</div>'
    +'<div style="margin-left:auto;display:flex;gap:6px">'
    +'<button id="'+tpId+'_btng" style="'+btnA+'" onclick="tpTab(0)">Global</button>'
    +'<button id="'+tpId+'_btns" style="'+btnI+'" onclick="tpTab(1)">Par service</button>'
    +'</div></div>'
    +'<div style="overflow-x:auto">'
    +'<div id="'+tpId+'_global">'+buildGlobalRows()+'</div>'
    +'<div id="'+tpId+'_service" style="display:none">'+buildServiceRows()+'</div>'
    +'</div>'
    +'<p style="font-size:11px;color:var(--text3);margin-top:8px">pp = points de pourcentage</p>'
    +'</div>';
}


// ═══════════════════════════════════════════════════
// FONCTIONS GLOBALES TRI CDR + ONGLETS TAUX DE PRISE
// ═══════════════════════════════════════════════════
function cdrSort(col){
  const data=window._CDR_DATA,moy=window._CDR_MOY,svks=window._CDR_SVKS,tid=window._CDR_TID;
  if(!data||!tid)return;
  if(window._CDR_SC===col){window._CDR_SD*=-1;}else{window._CDR_SC=col;window._CDR_SD=-1;}
  const sd=window._CDR_SD;
  for(let i=0;i<8;i++){const e=document.getElementById('si_'+tid+'_'+i);if(e)e.textContent='';}
  const icon=document.getElementById('si_'+tid+'_'+col);
  if(icon)icon.textContent=sd===-1?' ↓':' ↑';
  data.sort(function(a,b){
    if(col===0){return sd*(a.nom<b.nom?-1:a.nom>b.nom?1:0);}
    let va,vb;
    if(col>=1&&col<=4){const s=svks[col-1];va=a.svcs[s]?a.svcs[s].tm:-1;vb=b.svcs[s]?b.svcs[s].tm:-1;}
    else if(col===5){va=a.cv;vb=b.cv;}
    else if(col===6){va=a.ca;vb=b.ca;}
    else{va=a.offerts;vb=b.offerts;}
    return sd*(vb-va);
  });
  const tbody=document.getElementById(tid+'_body');
  if(!tbody)return;
  tbody.innerHTML=data.map(function(row,i){
    const rc=i===0?'r1':i===1?'r2':i===2?'r3':'rn';
    let tr='<tr><td><span class="rank '+rc+'">'+(i+1)+'</span> <b>'+row.nom+'</b></td>';
    svks.forEach(function(svc){
      const d=row.svcs[svc],above=d&&moy[svc]>0&&d.tm>moy[svc]*1.05;
      tr+=d?('<td class="r" style="color:'+(above?'var(--green)':'var(--text)')+'"><b>'+d.tm.toFixed(2)+'&#x20AC;</b><br><small style="color:var(--text3)">'+Math.round(d.cv)+' cv</small></td>')
          :'<td class="r" style="color:var(--text3)">&#x2014;</td>';
    });
    tr+='<td class="r">'+Math.round(row.cv)+'</td>'
       +'<td class="r">'+(row.ca/1000).toFixed(1)+' k&#x20AC;</td>'
       +'<td class="r" style="color:'+(row.offerts>0?'var(--red)':'var(--text3)')+'">'+Math.round(row.offerts)+' &#x20AC;</td></tr>';
    return tr;
  }).join('');
}

function tpTab(idx){
  const tid=window._TP_ID;if(!tid)return;
  const views=['global','service'];
  const v=views[idx]||'global';
  views.forEach(function(t){
    const el=document.getElementById(tid+'_'+t);if(el)el.style.display=t===v?'block':'none';
  });
  const btnA='padding:4px 12px;border-radius:4px;border:1px solid var(--warm);background:var(--warm);font-size:11px;cursor:pointer;font-weight:600;color:#fff';
  const btnI='padding:4px 12px;border-radius:4px;border:1px solid var(--border2);background:var(--surface);font-size:11px;cursor:pointer;font-weight:500;color:var(--text2)';
  const bg=document.getElementById(tid+'_btng'),bs=document.getElementById(tid+'_btns');
  if(bg)bg.style.cssText=v==='global'?btnA:btnI;
  if(bs)bs.style.cssText=v==='service'?btnA:btnI;
}
